name: CI Documentation Check

on:
  pull_request:
    branches: ['main']
    paths:
      - '**.md'

jobs:
  check-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Markdown Linting
        uses: davidanson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'

      - name: Spell Check
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: '**/*.md'
